<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TPG · Annonces</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14; --panel: #0f1623; --panel2: #162030;
    --border: #1c2d42; --accent: #00b8f0; --green: #00d48a;
    --warn: #f0a800; --danger: #f03050; --text: #ddeeff; --muted: #4a6a8a;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; overflow:hidden; }

  /* ── UNLOCK SCREEN ── */
  #unlockScreen {
    position:fixed; inset:0; z-index:1000;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:24px; padding:30px;
    text-align:center;
  }
  .unlock-icon { font-size:64px; }
  .unlock-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:28px; font-weight:900; letter-spacing:1px;
    color:var(--text);
  }
  .unlock-sub { font-size:15px; color:var(--muted); line-height:1.5; max-width:280px; }
  .unlock-btn {
    background:var(--green); color:#080c14;
    border:none; border-radius:16px;
    padding:18px 40px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:22px; font-weight:900; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer;
    box-shadow:0 0 30px rgba(0,212,138,0.35);
    animation:glow 2s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { box-shadow:0 0 20px rgba(0,212,138,.3); }
    50%      { box-shadow:0 0 40px rgba(0,212,138,.6); }
  }
  .unlock-note { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }

  /* ── APP ── */
  .app { display:flex; flex-direction:column; height:100dvh; }

  .header {
    background:var(--panel); border-bottom:1px solid var(--border);
    padding:10px 14px; display:flex; align-items:center; gap:10px; flex-shrink:0;
  }
  .header-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; letter-spacing:1px; text-transform:uppercase; }
  .header-sub   { font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-top:1px; }

  /* Audio status indicator */
  .audio-status {
    margin-left:auto; display:flex; align-items:center; gap:6px;
    background:rgba(0,212,138,0.1); border:1px solid rgba(0,212,138,0.3);
    border-radius:20px; padding:4px 10px;
    font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
    letter-spacing:1px; color:var(--green);
  }
  .audio-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Now playing */
  .now-playing {
    background:rgba(0,212,138,.08); border-bottom:1px solid rgba(0,212,138,.2);
    padding:10px 14px; display:none; align-items:center; gap:10px; flex-shrink:0;
  }
  .now-playing.visible { display:flex; }

  .np-bars { display:flex; gap:2px; align-items:flex-end; flex-shrink:0; }
  .np-bar  { width:3px; border-radius:2px; background:var(--green); animation:barAnim .6s ease-in-out infinite; }
  .np-bar:nth-child(1){height:8px;  animation-delay:0s}
  .np-bar:nth-child(2){height:14px; animation-delay:.1s}
  .np-bar:nth-child(3){height:10px; animation-delay:.2s}
  .np-bar:nth-child(4){height:16px; animation-delay:.05s}
  .np-bar:nth-child(5){height:8px;  animation-delay:.15s}
  @keyframes barAnim { 0%,100%{transform:scaleY(.4);opacity:.6} 50%{transform:scaleY(1);opacity:1} }

  .np-text { flex:1; }
  .np-label { font-size:10px; color:var(--green); font-family:'Barlow Condensed',sans-serif; letter-spacing:2px; text-transform:uppercase; font-weight:700; }
  .np-msg   { font-size:13px; color:var(--text); margin-top:2px; line-height:1.3; }

  .np-stop {
    background:rgba(240,48,80,.12); border:1px solid rgba(240,48,80,.3);
    border-radius:8px; padding:6px 12px;
    color:var(--danger); font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    cursor:pointer; flex-shrink:0;
  }

  /* Tabs */
  .cat-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
  .cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tab {
    padding:10px 16px; font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); cursor:pointer; white-space:nowrap;
    border-bottom:2px solid transparent; transition:all .15s;
    background:none; border-left:none; border-right:none; border-top:none; flex-shrink:0;
  }
  .cat-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

  /* Content */
  .content { flex:1; overflow-y:auto; }
  .content::-webkit-scrollbar { display:none; }
  .msg-list { padding:10px 12px 24px; display:flex; flex-direction:column; gap:8px; }

  .cat-section { display:none; flex-direction:column; gap:8px; }
  .cat-section.active { display:flex; }

  .section-label {
    font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:4px 2px 2px;
  }

  /* Message button */
  .msg-btn {
    background:var(--panel); border:1.5px solid var(--border);
    border-radius:14px; padding:0; overflow:hidden;
    cursor:pointer; width:100%; text-align:left; position:relative;
    transition:transform .1s;
  }
  .msg-btn:active { transform:scale(0.97); }
  .msg-btn.playing { border-color:var(--green); background:rgba(0,212,138,.06); box-shadow:0 0 16px rgba(0,212,138,.15); }
  .msg-btn.played  { border-color:rgba(0,184,240,.25); }

  .msg-progress { height:3px; background:var(--green); width:0%; transition:width .1s linear; border-radius:3px 3px 0 0; }

  .msg-inner { padding:13px 14px; display:flex; align-items:center; gap:12px; }

  .msg-play {
    width:44px; height:44px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; font-size:18px; font-weight:700; transition:all .2s;
  }
  .msg-btn.playing .msg-play { animation:playPulse 1.2s ease-in-out infinite; }
  @keyframes playPulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,212,138,.4)} 50%{box-shadow:0 0 0 8px rgba(0,212,138,0)} }

  .msg-info { flex:1; min-width:0; }
  .msg-title { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:800; letter-spacing:.5px; color:var(--text); line-height:1.1; }
  .msg-btn.playing .msg-title { color:var(--green); }
  .msg-preview { font-size:12px; color:var(--muted); margin-top:3px; line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .msg-btn.playing .msg-preview { color:rgba(0,212,138,.7); }

  .msg-meta { display:flex; gap:6px; margin-top:6px; align-items:center; }
  .msg-dur  { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); background:var(--panel2); border:1px solid var(--border); border-radius:4px; padding:1px 6px; }
  .msg-tag  { font-size:10px; font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.5px; padding:1px 7px; border-radius:4px; }
  .tag-info     { background:rgba(0,184,240,.12);  color:var(--accent); border:1px solid rgba(0,184,240,.25); }
  .tag-warn     { background:rgba(240,168,0,.12);  color:var(--warn);   border:1px solid rgba(240,168,0,.25); }
  .tag-urgent   { background:rgba(240,48,80,.12);  color:var(--danger); border:1px solid rgba(240,48,80,.3); }
  .tag-special  { background:rgba(0,212,138,.12);  color:var(--green);  border:1px solid rgba(0,212,138,.25); }

  .played-check { font-size:16px; flex-shrink:0; opacity:0; transition:opacity .3s; }
  .msg-btn.played  .played-check { opacity:.5; }
  .msg-btn.playing .played-check { opacity:0; }

  /* Toast */
  .toast {
    position:fixed; bottom:16px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--panel2); border:1px solid var(--border);
    border-radius:20px; padding:9px 20px;
    font-size:13px; color:var(--text); font-family:'Barlow Condensed',sans-serif;
    letter-spacing:1px; opacity:0; transition:all .25s; pointer-events:none;
    z-index:999; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  .toast.show  { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.green { border-color:var(--green); color:var(--green); }
  .toast.danger{ border-color:var(--danger); color:var(--danger); }
</style>
</head>
<body>

<!-- ══ ÉCRAN DE DÉMARRAGE ══ -->
<div id="unlockScreen">
  <div class="unlock-icon">🔊</div>
  <div class="unlock-title">Activer le son</div>
  <div class="unlock-sub">Appuyez sur le bouton pour activer la diffusion audio des annonces voyageurs.</div>
  <button class="unlock-btn" onclick="unlockAudio()">
    Activer l'audio
  </button>
  <div class="unlock-note">Requis par Android Chrome pour la synthèse vocale</div>
</div>

<!-- ══ APP ══ -->
<div class="app" id="appMain" style="display:none">

  <div class="header">
    <div>
      <div class="header-title">📢 Annonces</div>
      <div class="header-sub">Ligne 18 · Vhc 482 · Martin D.</div>
    </div>
    <div class="audio-status">
      <div class="audio-dot"></div>
      SON ACTIF
    </div>
  </div>

  <!-- Now playing bar -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-bars">
      <div class="np-bar"></div><div class="np-bar"></div>
      <div class="np-bar"></div><div class="np-bar"></div>
      <div class="np-bar"></div>
    </div>
    <div class="np-text">
      <div class="np-label">Diffusion en cours</div>
      <div class="np-msg" id="npMsg">—</div>
    </div>
    <button class="np-stop" onclick="stopAll()">■ Stop</button>
  </div>

  <!-- Category tabs -->
  <div class="cat-tabs">
    <button class="cat-tab active" onclick="switchCat('all',this)">Tous</button>
    <button class="cat-tab" onclick="switchCat('info',this)">ℹ Info</button>
    <button class="cat-tab" onclick="switchCat('deviation',this)">🔀 Déviation</button>
    <button class="cat-tab" onclick="switchCat('incident',this)">⚠️ Incident</button>
    <button class="cat-tab" onclick="switchCat('special',this)">🌟 Spécial</button>
  </div>

  <div class="content">
    <div class="msg-list" id="msgList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── Message data ──
  const MESSAGES = [
    { id:0,  cat:'info',      color:'accent',  tag:'tag-info',    tagLbl:'INFO',      title:'Bienvenue à bord',        text:'Bienvenue à bord du bus T P G ligne 18 en direction de Carouge Rondeau. Nous vous souhaitons un agréable voyage.' },
    { id:1,  cat:'info',      color:'accent',  tag:'tag-info',    tagLbl:'INFO',      title:'Validation du titre',     text:'Pensez à valider votre titre de transport à chaque montée. Merci de votre collaboration.' },
    { id:2,  cat:'info',      color:'warn',    tag:'tag-warn',    tagLbl:'RETARD',    title:'Retard de service',       text:'Mesdames et Messieurs, ce service accuse un retard d\'environ cinq minutes. Nous vous prions de nous excuser pour ce désagrément.' },
    { id:3,  cat:'info',      color:'warn',    tag:'tag-warn',    tagLbl:'TERMINUS',  title:'Terminus anticipé',       text:'Mesdames et Messieurs, ce bus effectue son terminus anticipé à cet arrêt. Nous vous invitons à emprunter le prochain service.' },
    { id:4,  cat:'deviation', color:'warn',    tag:'tag-warn',    tagLbl:'DÉVIATION', title:'Déviation en cours',      text:'Mesdames et Messieurs, ce bus est actuellement en déviation. L\'itinéraire est modifié jusqu\'à nouvel avis. Merci de votre compréhension.' },
    { id:5,  cat:'deviation', color:'warn',    tag:'tag-warn',    tagLbl:'DÉVIATION', title:'Arrêts non desservis',    text:'En raison d\'une déviation, certains arrêts habituels ne sont pas desservis ce jour. Veuillez consulter les informations aux arrêts.' },
    { id:6,  cat:'deviation', color:'accent',  tag:'tag-info',    tagLbl:'INFO',      title:'Fin de déviation',        text:'Mesdames et Messieurs, ce bus reprend désormais son itinéraire habituel. Merci de votre patience.' },
    { id:7,  cat:'incident',  color:'danger',  tag:'tag-urgent',  tagLbl:'URGENT',    title:'Interruption momentanée', text:'Mesdames et Messieurs, en raison d\'un incident sur la ligne, ce service est momentanément interrompu. Veuillez patienter, nous vous remercions.' },
    { id:8,  cat:'incident',  color:'danger',  tag:'tag-urgent',  tagLbl:'URGENT',    title:'Évacuation du véhicule',  text:'Mesdames et Messieurs, nous vous demandons de bien vouloir descendre du véhicule par la porte avant. Merci de votre coopération.' },
    { id:9,  cat:'special',   color:'green',   tag:'tag-special', tagLbl:'SPÉCIAL',   title:'Carouge-Marché — Hôtels', text:'Prochain arrêt, Carouge Marché. Pour les voyageurs à destination des hôtels Bristol et de Carouge, veuillez descendre à cet arrêt.' },
    { id:10, cat:'special',   color:'green',   tag:'tag-special', tagLbl:'SPÉCIAL',   title:'Cornavin — Hôtels',       text:'Prochain arrêt, Cornavin. Pour les voyageurs à destination des hôtels Cornavin, Cristal et des Alpes, veuillez descendre à cet arrêt.' },
    { id:11, cat:'special',   color:'green',   tag:'tag-special', tagLbl:'SPÉCIAL',   title:'Victor-Hugo — Hôtels',    text:'Prochain arrêt, Carouge Victor Hugo. Pour les voyageurs à destination de l\'Hôtel Président et de l\'Hôtel de Genève, veuillez descendre à cet arrêt.' },
  ];

  const CAT_LABELS = {
    info:'ℹ Information générale', deviation:'🔀 Déviation', incident:'⚠️ Incident', special:'🌟 Service spécial'
  };

  const COLOR_MAP = {
    accent:  { bg:'rgba(0,184,240,.12)',  fg:'var(--accent)' },
    warn:    { bg:'rgba(240,168,0,.12)',  fg:'var(--warn)'   },
    danger:  { bg:'rgba(240,48,80,.12)', fg:'var(--danger)' },
    green:   { bg:'rgba(0,212,138,.12)', fg:'var(--green)'  },
  };

  let currentCat = 'all';
  let currentId  = null;
  let progTimer  = null;
  let startTime  = null;
  let estDur     = 0;
  let audioCtx   = null;
  let voices     = [];

  // ── Unlock audio (Android Chrome requires user gesture) ──
  function unlockAudio() {
    // Create AudioContext on user gesture
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      // Play a tiny silent buffer to unlock
      const buf = audioCtx.createBuffer(1,1,22050);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(audioCtx.destination);
      src.start(0);
    } catch(e) {}

    // Pre-load voices
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      // Trigger a silent utterance to warm up the engine
      const warmup = new SpeechSynthesisUtterance(' ');
      warmup.volume = 0;
      warmup.lang = 'fr-FR';
      window.speechSynthesis.speak(warmup);
      // Cache voices
      voices = window.speechSynthesis.getVoices();
      if (!voices.length) {
        window.speechSynthesis.onvoiceschanged = () => {
          voices = window.speechSynthesis.getVoices();
        };
      }
    }

    // Show app
    document.getElementById('unlockScreen').style.display = 'none';
    document.getElementById('appMain').style.display = 'flex';
    renderMessages('all');
    toast('🔊 Audio activé — prêt à diffuser', 'green');
  }

  // ── Build message buttons ──
  function renderMessages(cat) {
    const list = document.getElementById('msgList');
    list.innerHTML = '';

    const filtered = cat === 'all' ? MESSAGES : MESSAGES.filter(m => m.cat === cat);

    // Group by category if showing all
    if (cat === 'all') {
      const cats = ['info','deviation','incident','special'];
      cats.forEach(c => {
        const group = MESSAGES.filter(m => m.cat === c);
        if (!group.length) return;
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.textContent = CAT_LABELS[c];
        list.appendChild(lbl);
        group.forEach(m => list.appendChild(buildBtn(m)));
      });
    } else {
      filtered.forEach(m => list.appendChild(buildBtn(m)));
    }
  }

  function buildBtn(m) {
    const col = COLOR_MAP[m.color];
    const dur = Math.ceil(m.text.split(' ').length / 2.5);
    const btn = document.createElement('button');
    btn.className = 'msg-btn';
    btn.id = 'btn-' + m.id;
    btn.onclick = () => play(m.id);
    btn.innerHTML = `
      <div class="msg-progress" id="prog-${m.id}"></div>
      <div class="msg-inner">
        <div class="msg-play" id="icon-${m.id}" style="background:${col.bg};color:${col.fg}">▶</div>
        <div class="msg-info">
          <div class="msg-title">${m.title}</div>
          <div class="msg-preview">${m.text.substring(0,55)}…</div>
          <div class="msg-meta">
            <span class="msg-dur">~${dur}s</span>
            <span class="msg-tag ${m.tag}">${m.tagLbl}</span>
          </div>
        </div>
        <div class="played-check" id="check-${m.id}">✓</div>
      </div>`;
    return btn;
  }

  // ── Play ──
  function play(id) {
    if (currentId === id) { stopAll(); return; }
    stopAll();

    const msg = MESSAGES.find(m => m.id === id);
    if (!msg) return;
    currentId = id;

    const btn  = document.getElementById('btn-'  + id);
    const icon = document.getElementById('icon-' + id);
    const prog = document.getElementById('prog-' + id);

    if (btn)  btn.classList.add('playing');
    if (icon) icon.textContent = '■';

    document.getElementById('nowPlaying').classList.add('visible');
    document.getElementById('npMsg').textContent = msg.title;

    // Progress bar
    estDur    = (msg.text.split(' ').length / 2.0) * 1000;
    startTime = Date.now();
    progTimer = setInterval(() => {
      if (!prog) return;
      const pct = Math.min(98, ((Date.now() - startTime) / estDur) * 100);
      prog.style.width = pct + '%';
    }, 80);

    // Speak — with Android Chrome workaround
    speakText(msg.text, () => {
      clearInterval(progTimer);
      if (prog) prog.style.width = '100%';
      setTimeout(() => {
        if (btn)  { btn.classList.remove('playing'); btn.classList.add('played'); }
        if (icon) icon.textContent = '▶';
        if (prog) prog.style.width = '0%';
        const check = document.getElementById('check-' + id);
        if (check) check.style.opacity = '0.5';
        document.getElementById('nowPlaying').classList.remove('visible');
        currentId = null;
      }, 300);
    });

    toast('▶ ' + msg.title, 'green');
  }

  // Android Chrome TTS fix: chunk long text + resume on pause
  function speakText(text, onEnd) {
    if (!('speechSynthesis' in window)) {
      alert('La synthèse vocale n\'est pas supportée par ce navigateur.');
      return;
    }

    window.speechSynthesis.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = 'fr-FR';
    utt.rate  = 0.88;
    utt.pitch = 1.0;
    utt.volume = 1.0;

    // Pick best French voice available
    const allVoices = window.speechSynthesis.getVoices();
    const frVoice = allVoices.find(v => v.lang.startsWith('fr') && v.localService)
                 || allVoices.find(v => v.lang.startsWith('fr'))
                 || null;
    if (frVoice) utt.voice = frVoice;

    utt.onend   = () => onEnd();
    utt.onerror = (e) => { console.warn('TTS error', e); onEnd(); };

    window.speechSynthesis.speak(utt);

    // Android Chrome bug: speech pauses after ~14s — keep it alive
    const keepAlive = setInterval(() => {
      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      }
      if (!window.speechSynthesis.speaking) {
        clearInterval(keepAlive);
      }
    }, 5000);

    // Store so stopAll() can clear it
    window._ttsKeepAlive = keepAlive;
  }

  // ── Stop ──
  function stopAll() {
    if (window._ttsKeepAlive) { clearInterval(window._ttsKeepAlive); window._ttsKeepAlive = null; }
    clearInterval(progTimer);
    window.speechSynthesis && window.speechSynthesis.cancel();

    if (currentId !== null) {
      const btn  = document.getElementById('btn-'  + currentId);
      const icon = document.getElementById('icon-' + currentId);
      const prog = document.getElementById('prog-' + currentId);
      if (btn)  btn.classList.remove('playing');
      if (icon) icon.textContent = '▶';
      if (prog) prog.style.width = '0%';
      currentId = null;
    }
    document.getElementById('nowPlaying').classList.remove('visible');
  }

  // ── Category filter ──
  function switchCat(cat, btn) {
    stopAll();
    currentCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderMessages(cat);
  }

  // ── Toast ──
  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast' + (type ? ' '+type : '');
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
