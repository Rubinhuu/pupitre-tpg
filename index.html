<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TPG · Annonces</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14; --panel:#0f1623; --panel2:#162030;
    --border:#1c2d42; --accent:#00b8f0; --green:#00d48a;
    --warn:#f0a800; --danger:#f03050; --text:#ddeeff; --muted:#4a6a8a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}

  /* UNLOCK */
  #unlockScreen{
    position:fixed;inset:0;z-index:1000;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;padding:30px;text-align:center;
  }
  .unlock-icon{font-size:60px}
  .unlock-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;letter-spacing:1px}
  .unlock-sub{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px}
  .unlock-btn{
    background:var(--green);color:#080c14;border:none;border-radius:16px;
    padding:18px 40px;font-family:'Barlow Condensed',sans-serif;
    font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;
    animation:glow 2s ease-in-out infinite;
  }
  @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,212,138,.3)}50%{box-shadow:0 0 40px rgba(0,212,138,.6)}}

  /* Voice selector on unlock */
  .voice-selector{
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;width:100%;max-width:320px;
  }
  .vs-label{font-size:11px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .vs-list{display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto}
  .vs-list::-webkit-scrollbar{display:none}
  .voice-opt{
    background:var(--panel2);border:1.5px solid var(--border);border-radius:8px;
    padding:8px 12px;cursor:pointer;transition:all .15s;text-align:left;
    display:flex;align-items:center;gap:8px;
  }
  .voice-opt.selected{border-color:var(--green);background:rgba(0,212,138,.08)}
  .voice-opt-name{font-size:13px;font-weight:600;color:var(--text)}
  .voice-opt-lang{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px}
  .voice-opt-badge{
    margin-left:auto;font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;
    letter-spacing:1px;padding:2px 7px;border-radius:4px;flex-shrink:0;
  }
  .badge-best{background:rgba(0,212,138,.15);color:var(--green);border:1px solid rgba(0,212,138,.3)}
  .badge-ok  {background:rgba(0,184,240,.12);color:var(--accent);border:1px solid rgba(0,184,240,.25)}

  /* APP */
  .app{display:flex;flex-direction:column;height:100dvh}

  .header{
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
  }
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:1px;text-transform:uppercase}
  .header-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px}

  .voice-badge{
    margin-left:auto;display:flex;align-items:center;gap:6px;
    background:rgba(0,212,138,.1);border:1px solid rgba(0,212,138,.3);
    border-radius:20px;padding:4px 10px;cursor:pointer;
  }
  .vb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .vb-name{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--green)}

  /* Now playing */
  .now-playing{
    background:rgba(0,212,138,.08);border-bottom:1px solid rgba(0,212,138,.2);
    padding:10px 14px;display:none;align-items:center;gap:10px;flex-shrink:0;
  }
  .now-playing.visible{display:flex}
  .np-bars{display:flex;gap:2px;align-items:flex-end;flex-shrink:0}
  .np-bar{width:3px;border-radius:2px;background:var(--green);animation:barAnim .6s ease-in-out infinite}
  .np-bar:nth-child(1){height:8px;animation-delay:0s}
  .np-bar:nth-child(2){height:14px;animation-delay:.1s}
  .np-bar:nth-child(3){height:10px;animation-delay:.2s}
  .np-bar:nth-child(4){height:16px;animation-delay:.05s}
  .np-bar:nth-child(5){height:8px;animation-delay:.15s}
  @keyframes barAnim{0%,100%{transform:scaleY(.4);opacity:.6}50%{transform:scaleY(1);opacity:1}}
  .np-text{flex:1}
  .np-label{font-size:10px;color:var(--green);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;font-weight:700}
  .np-msg{font-size:13px;color:var(--text);margin-top:2px;line-height:1.3}
  .np-stop{
    background:rgba(240,48,80,.12);border:1px solid rgba(240,48,80,.3);
    border-radius:8px;padding:6px 12px;color:var(--danger);
    font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;cursor:pointer;flex-shrink:0;
  }

  /* Tabs */
  .cat-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{
    padding:10px 16px;font-family:'Barlow Condensed',sans-serif;
    font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);cursor:pointer;white-space:nowrap;
    border-bottom:2px solid transparent;transition:all .15s;
    background:none;border-left:none;border-right:none;border-top:none;flex-shrink:0;
  }
  .cat-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .content{flex:1;overflow-y:auto}
  .content::-webkit-scrollbar{display:none}
  .msg-list{padding:10px 12px 24px;display:flex;flex-direction:column;gap:8px}

  .section-label{
    font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;
    letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:6px 2px 2px;
  }

  /* Message button */
  .msg-btn{
    background:var(--panel);border:1.5px solid var(--border);
    border-radius:14px;padding:0;overflow:hidden;
    cursor:pointer;width:100%;text-align:left;position:relative;
    transition:transform .1s;
  }
  .msg-btn:active{transform:scale(0.97)}
  .msg-btn.playing{border-color:var(--green);background:rgba(0,212,138,.06);box-shadow:0 0 16px rgba(0,212,138,.15)}
  .msg-btn.played{border-color:rgba(0,184,240,.25)}

  .msg-progress{height:3px;background:var(--green);width:0%;transition:width .1s linear;border-radius:3px 3px 0 0}
  .msg-inner{padding:13px 14px;display:flex;align-items:center;gap:12px}

  .msg-play{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:18px;font-weight:700;transition:all .2s;
  }
  .msg-btn.playing .msg-play{animation:playPulse 1.2s ease-in-out infinite}
  @keyframes playPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,212,138,.4)}50%{box-shadow:0 0 0 8px rgba(0,212,138,0)}}

  .msg-info{flex:1;min-width:0}
  .msg-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:.5px;color:var(--text);line-height:1.1}
  .msg-btn.playing .msg-title{color:var(--green)}
  .msg-preview{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-btn.playing .msg-preview{color:rgba(0,212,138,.7)}
  .msg-meta{display:flex;gap:6px;margin-top:6px;align-items:center}
  .msg-dur{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:1px 6px}
  .msg-tag{font-size:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.5px;padding:1px 7px;border-radius:4px}
  .tag-info   {background:rgba(0,184,240,.12);color:var(--accent);border:1px solid rgba(0,184,240,.25)}
  .tag-warn   {background:rgba(240,168,0,.12);color:var(--warn);border:1px solid rgba(240,168,0,.25)}
  .tag-urgent {background:rgba(240,48,80,.12);color:var(--danger);border:1px solid rgba(240,48,80,.3)}
  .tag-special{background:rgba(0,212,138,.12);color:var(--green);border:1px solid rgba(0,212,138,.25)}

  .played-check{font-size:16px;flex-shrink:0;opacity:0;transition:opacity .3s}
  .msg-btn.played  .played-check{opacity:.5}
  .msg-btn.playing .played-check{opacity:0}

  /* Voice picker sheet */
  .sheet-overlay{
    position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;
  }
  .sheet-overlay.hidden{display:none}
  .sheet{
    background:var(--panel);border-radius:16px 16px 0 0;
    padding:16px 14px 32px;width:100%;border-top:1px solid var(--border);
  }
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px}
  .sheet-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .sheet-voices{display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto}
  .sheet-voices::-webkit-scrollbar{display:none}

  /* Rate control */
  .rate-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
  .rate-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex-shrink:0}
  input[type=range]{flex:1;accent-color:var(--accent)}
  .rate-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);flex-shrink:0;width:30px;text-align:right}

  /* Toast */
  .toast{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--panel2);border:1px solid var(--border);border-radius:20px;
    padding:9px 20px;font-size:13px;color:var(--text);font-family:'Barlow Condensed',sans-serif;
    letter-spacing:1px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;
    white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.green{border-color:var(--green);color:var(--green)}
  .toast.danger{border-color:var(--danger);color:var(--danger)}
</style>
</head>
<body>

<!-- UNLOCK SCREEN -->
<div id="unlockScreen">
  <div class="unlock-icon">🔊</div>
  <div class="unlock-title">Activer le son</div>
  <div class="unlock-sub">Choisissez une voix puis appuyez sur Activer.</div>

  <div class="voice-selector">
    <div class="vs-label">Voix disponibles</div>
    <div class="vs-list" id="voiceList">
      <div style="color:var(--muted);font-size:12px;padding:8px">Chargement des voix...</div>
    </div>
  </div>

  <div class="rate-row" style="width:100%;max-width:320px;background:var(--panel);border-radius:12px;padding:12px 16px;border:1px solid var(--border)">
    <div class="rate-label">Vitesse</div>
    <input type="range" id="rateSlider" min="0.6" max="1.2" step="0.05" value="0.85" oninput="updateRate(this.value)">
    <div class="rate-val" id="rateVal">0.85</div>
  </div>

  <button class="unlock-btn" onclick="unlockAudio()">▶ Activer</button>
</div>

<!-- APP -->
<div class="app" id="appMain" style="display:none">

  <div class="header">
    <div>
      <div class="header-title">📢 Annonces</div>
      <div class="header-sub">Ligne 18 · Vhc 482 · Martin D.</div>
    </div>
    <div class="voice-badge" onclick="openVoiceSheet()">
      <div class="vb-dot"></div>
      <div class="vb-name" id="activeBadgeName">Voix</div>
    </div>
  </div>

  <div class="now-playing" id="nowPlaying">
    <div class="np-bars">
      <div class="np-bar"></div><div class="np-bar"></div>
      <div class="np-bar"></div><div class="np-bar"></div>
      <div class="np-bar"></div>
    </div>
    <div class="np-text">
      <div class="np-label">Diffusion en cours</div>
      <div class="np-msg" id="npMsg">—</div>
    </div>
    <button class="np-stop" onclick="stopAll()">■ Stop</button>
  </div>

  <div class="cat-tabs">
    <button class="cat-tab active" onclick="switchCat('all',this)">Tous</button>
    <button class="cat-tab" onclick="switchCat('info',this)">ℹ Info</button>
    <button class="cat-tab" onclick="switchCat('deviation',this)">🔀 Déviation</button>
    <button class="cat-tab" onclick="switchCat('incident',this)">⚠️ Incident</button>
    <button class="cat-tab" onclick="switchCat('special',this)">🌟 Spécial</button>
  </div>

  <div class="content">
    <div class="msg-list" id="msgList"></div>
  </div>
</div>

<!-- VOICE SHEET -->
<div class="sheet-overlay hidden" id="voiceSheet" onclick="closeVoiceSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Changer la voix</div>
    <div class="sheet-voices" id="sheetVoiceList"></div>
    <div class="rate-row">
      <div class="rate-label">Vitesse</div>
      <input type="range" id="rateSlider2" min="0.6" max="1.2" step="0.05" value="0.85" oninput="updateRate(this.value,true)">
      <div class="rate-val" id="rateVal2">0.85</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Data ──
  const MESSAGES = [
    {id:0,  cat:'info',     color:'accent', tag:'tag-info',    lbl:'INFO',      title:'Bienvenue à bord',
     text:'Bienvenue à bord du bus T P G ligne 18, en direction de Carouge Rondeau. Nous vous souhaitons un agréable voyage.'},
    {id:1,  cat:'info',     color:'accent', tag:'tag-info',    lbl:'INFO',      title:'Validation du titre',
     text:'Nous vous rappelons de bien vouloir valider votre titre de transport à chaque montée dans le véhicule. Merci de votre collaboration.'},
    {id:2,  cat:'info',     color:'warn',   tag:'tag-warn',    lbl:'RETARD',    title:'Retard de service',
     text:'Mesdames et Messieurs, nous vous informons que ce service accuse un retard d\'environ cinq minutes. Nous nous en excusons et vous remercions de votre compréhension.'},
    {id:3,  cat:'info',     color:'warn',   tag:'tag-warn',    lbl:'TERMINUS',  title:'Terminus anticipé',
     text:'Mesdames et Messieurs, ce bus effectue son terminus anticipé à cet arrêt. Nous vous invitons à bien vouloir emprunter le prochain service. Merci.'},
    {id:4,  cat:'deviation',color:'warn',   tag:'tag-warn',    lbl:'DÉVIATION', title:'Déviation en cours',
     text:'Mesdames et Messieurs, en raison de travaux sur l\'itinéraire habituel, ce bus est actuellement en déviation. L\'itinéraire est modifié jusqu\'à nouvel avis. Merci de votre compréhension.'},
    {id:5,  cat:'deviation',color:'warn',   tag:'tag-warn',    lbl:'DÉVIATION', title:'Arrêts non desservis',
     text:'Nous vous informons qu\'en raison d\'une déviation, plusieurs arrêts habituels ne sont pas desservis ce jour. Veuillez consulter les informations affichées aux arrêts ou contacter notre service clientèle.'},
    {id:6,  cat:'deviation',color:'accent', tag:'tag-info',    lbl:'INFO',      title:'Fin de déviation',
     text:'Mesdames et Messieurs, nous vous informons que ce bus reprend désormais son itinéraire habituel. Merci de votre patience.'},
    {id:7,  cat:'incident', color:'danger', tag:'tag-urgent',  lbl:'URGENT',    title:'Interruption momentanée',
     text:'Mesdames et Messieurs, en raison d\'un incident sur la ligne, ce service est momentanément interrompu. Nous vous prions de bien vouloir patienter. Merci de votre compréhension.'},
    {id:8,  cat:'incident', color:'danger', tag:'tag-urgent',  lbl:'URGENT',    title:'Évacuation du véhicule',
     text:'Mesdames et Messieurs, nous vous demandons de bien vouloir descendre du véhicule par la porte avant, de manière calme et ordonnée. Merci de votre coopération.'},
    {id:9,  cat:'special',  color:'green',  tag:'tag-special', lbl:'SPÉCIAL',   title:'Carouge-Marché — Hôtels',
     text:'Prochain arrêt, Carouge Marché. Pour les voyageurs à destination des hôtels Bristol et de Carouge, nous vous invitons à descendre à cet arrêt.'},
    {id:10, cat:'special',  color:'green',  tag:'tag-special', lbl:'SPÉCIAL',   title:'Cornavin — Hôtels',
     text:'Prochain arrêt, Cornavin. Pour les voyageurs à destination des hôtels Cornavin, Cristal et des Alpes, nous vous invitons à descendre à cet arrêt.'},
    {id:11, cat:'special',  color:'green',  tag:'tag-special', lbl:'SPÉCIAL',   title:'Victor-Hugo — Hôtels',
     text:'Prochain arrêt, Carouge Victor Hugo. Pour les voyageurs à destination de l\'hôtel Président et de l\'hôtel de Genève, nous vous invitons à descendre à cet arrêt.'},
  ];

  const COLORS = {
    accent:{bg:'rgba(0,184,240,.12)',fg:'var(--accent)'},
    warn:  {bg:'rgba(240,168,0,.12)',fg:'var(--warn)'},
    danger:{bg:'rgba(240,48,80,.12)',fg:'var(--danger)'},
    green: {bg:'rgba(0,212,138,.12)',fg:'var(--green)'},
  };

  const CAT_LABELS = {
    info:'ℹ Information générale',
    deviation:'🔀 Déviation',
    incident:'⚠️ Incident',
    special:'🌟 Service spécial'
  };

  // ── State ──
  let allVoices     = [];
  let selectedVoice = null;
  let speechRate    = 0.85;
  let currentId     = null;
  let progTimer     = null;

  // ── Load voices ──
  function loadVoices() {
    allVoices = window.speechSynthesis.getVoices();
    // Filter: French voices first, then all others
    const fr = allVoices.filter(v => v.lang.startsWith('fr'));
    const others = allVoices.filter(v => !v.lang.startsWith('fr'));
    renderVoiceList([...fr, ...others], 'voiceList', true);
    // Auto-select best French voice
    autoSelectVoice();
  }

  function autoSelectVoice() {
    // Priority: local French > remote French > any French
    const local  = allVoices.find(v => v.lang.startsWith('fr') && v.localService);
    const remote = allVoices.find(v => v.lang.startsWith('fr') && !v.localService);
    const any    = allVoices.find(v => v.lang.startsWith('fr'));
    selectedVoice = local || remote || any || (allVoices[0] || null);
    updateVoiceUI();
  }

  function renderVoiceList(voices, containerId, isUnlock) {
    const container = document.getElementById(containerId);
    if (!voices.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">Aucune voix disponible</div>';
      return;
    }
    container.innerHTML = '';
    voices.forEach(v => {
      const isFr   = v.lang.startsWith('fr');
      const isLocal= v.localService;
      const isBest = isFr && isLocal;
      const label  = isBest ? 'RECOMMANDÉE' : (isFr ? 'FR' : v.lang.toUpperCase().substring(0,5));
      const badgeCls = isBest ? 'badge-best' : 'badge-ok';

      // Clean name
      let name = v.name
        .replace('Google','Google ·')
        .replace('Microsoft','Microsoft ·')
        .replace('(French)','')
        .replace('(France)','')
        .trim();

      const div = document.createElement('div');
      div.className = 'voice-opt' + (selectedVoice && selectedVoice.name === v.name ? ' selected' : '');
      div.innerHTML = `
        <div>
          <div class="voice-opt-name">${name}</div>
          <div class="voice-opt-lang">${v.lang} · ${isLocal ? 'Locale' : 'En ligne'}</div>
        </div>
        <div class="voice-opt-badge ${badgeCls}">${label}</div>`;
      div.onclick = () => {
        selectedVoice = v;
        updateVoiceUI();
        // Preview
        previewVoice(v);
        // Update selection UI
        container.querySelectorAll('.voice-opt').forEach(o => o.classList.remove('selected'));
        div.classList.add('selected');
        // Sync both lists
        syncVoiceSelection(v.name);
      };
      container.appendChild(div);
    });
  }

  function syncVoiceSelection(name) {
    document.querySelectorAll('.voice-opt').forEach(o => {
      o.classList.toggle('selected', o.querySelector('.voice-opt-name').textContent.replace('Google ·','Google').replace('Microsoft ·','Microsoft').trim() === name.replace('Google','Google ·').replace('Microsoft','Microsoft ·').trim());
    });
  }

  function updateVoiceUI() {
    if (!selectedVoice) return;
    let shortName = selectedVoice.name
      .replace('Google','G.')
      .replace('Microsoft','MS.')
      .split(' ').slice(0,3).join(' ');
    const badge = document.getElementById('activeBadgeName');
    if (badge) badge.textContent = shortName;
  }

  function previewVoice(voice) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance('Prochain arrêt, Carouge Marché.');
    u.voice = voice; u.lang = voice.lang;
    u.rate = speechRate; u.pitch = 1.0; u.volume = 1.0;
    window.speechSynthesis.speak(u);
  }

  function updateRate(val, fromSheet) {
    speechRate = parseFloat(val);
    document.getElementById('rateVal').textContent  = val;
    document.getElementById('rateVal2').textContent = val;
    document.getElementById('rateSlider').value  = val;
    document.getElementById('rateSlider2').value = val;
  }

  // ── Unlock ──
  function unlockAudio() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const buf = ctx.createBuffer(1,1,22050);
      const src = ctx.createBufferSource();
      src.buffer = buf; src.connect(ctx.destination); src.start(0);
    } catch(e){}
    window.speechSynthesis.cancel();
    const warmup = new SpeechSynthesisUtterance(' ');
    warmup.volume = 0; warmup.lang = 'fr-FR';
    window.speechSynthesis.speak(warmup);
    document.getElementById('unlockScreen').style.display = 'none';
    document.getElementById('appMain').style.display = 'flex';
    renderMessages('all');
    // Sync sheet voice list
    const fr = allVoices.filter(v => v.lang.startsWith('fr'));
    const others = allVoices.filter(v => !v.lang.startsWith('fr'));
    renderVoiceList([...fr,...others], 'sheetVoiceList', false);
    toast('🔊 Audio activé', 'green');
  }

  // ── Voice sheet ──
  function openVoiceSheet() {
    document.getElementById('voiceSheet').classList.remove('hidden');
  }
  function closeVoiceSheet(e) {
    if (e.target === document.getElementById('voiceSheet'))
      document.getElementById('voiceSheet').classList.add('hidden');
  }

  // ── Render messages ──
  function renderMessages(cat) {
    const list = document.getElementById('msgList');
    list.innerHTML = '';
    if (cat === 'all') {
      ['info','deviation','incident','special'].forEach(c => {
        const group = MESSAGES.filter(m => m.cat === c);
        if (!group.length) return;
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.textContent = CAT_LABELS[c];
        list.appendChild(lbl);
        group.forEach(m => list.appendChild(buildBtn(m)));
      });
    } else {
      MESSAGES.filter(m => m.cat === cat).forEach(m => list.appendChild(buildBtn(m)));
    }
  }

  function buildBtn(m) {
    const col = COLORS[m.color];
    const dur = Math.ceil(m.text.split(' ').length / 2.2);
    const btn = document.createElement('button');
    btn.className = 'msg-btn'; btn.id = 'btn-'+m.id;
    btn.onclick = () => play(m.id);
    btn.innerHTML = `
      <div class="msg-progress" id="prog-${m.id}"></div>
      <div class="msg-inner">
        <div class="msg-play" id="icon-${m.id}" style="background:${col.bg};color:${col.fg}">▶</div>
        <div class="msg-info">
          <div class="msg-title">${m.title}</div>
          <div class="msg-preview">${m.text.substring(0,55)}…</div>
          <div class="msg-meta">
            <span class="msg-dur">~${dur}s</span>
            <span class="msg-tag ${m.tag}">${m.lbl}</span>
          </div>
        </div>
        <div class="played-check" id="check-${m.id}">✓</div>
      </div>`;
    return btn;
  }

  // ── Play ──
  function play(id) {
    if (currentId === id) { stopAll(); return; }
    stopAll();

    const msg = MESSAGES.find(m => m.id === id);
    if (!msg) return;
    currentId = id;

    const btn  = document.getElementById('btn-'+id);
    const icon = document.getElementById('icon-'+id);
    const prog = document.getElementById('prog-'+id);
    if (btn)  btn.classList.add('playing');
    if (icon) icon.textContent = '■';
    document.getElementById('nowPlaying').classList.add('visible');
    document.getElementById('npMsg').textContent = msg.title;

    // Progress
    const estDur = (msg.text.split(' ').length / (speechRate * 2.2)) * 1000;
    const start  = Date.now();
    progTimer = setInterval(() => {
      if (!prog) return;
      prog.style.width = Math.min(97, ((Date.now()-start)/estDur)*100) + '%';
    }, 80);

    speakText(msg.text, () => {
      clearInterval(progTimer);
      if (prog) prog.style.width = '100%';
      setTimeout(() => {
        if (btn)  { btn.classList.remove('playing'); btn.classList.add('played'); }
        if (icon) icon.textContent = '▶';
        if (prog) prog.style.width = '0%';
        const check = document.getElementById('check-'+id);
        if (check) check.style.opacity = '0.5';
        document.getElementById('nowPlaying').classList.remove('visible');
        currentId = null;
      }, 300);
    });

    toast('▶ '+msg.title, 'green');
  }

  function speakText(text, onEnd) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (selectedVoice) { u.voice = selectedVoice; u.lang = selectedVoice.lang; }
    else u.lang = 'fr-FR';
    u.rate   = speechRate;
    u.pitch  = 1.02;   // Très légèrement au-dessus du neutre = plus naturel
    u.volume = 1.0;
    u.onend   = () => { clearKeepAlive(); onEnd(); };
    u.onerror = (e) => { clearKeepAlive(); onEnd(); };
    window.speechSynthesis.speak(u);

    // Android Chrome keep-alive
    window._ka = setInterval(() => {
      if (window.speechSynthesis.paused)  window.speechSynthesis.resume();
      if (!window.speechSynthesis.speaking) clearKeepAlive();
    }, 5000);
  }

  function clearKeepAlive() {
    if (window._ka) { clearInterval(window._ka); window._ka = null; }
  }

  function stopAll() {
    clearKeepAlive();
    clearInterval(progTimer);
    window.speechSynthesis && window.speechSynthesis.cancel();
    if (currentId !== null) {
      const btn  = document.getElementById('btn-'+currentId);
      const icon = document.getElementById('icon-'+currentId);
      const prog = document.getElementById('prog-'+currentId);
      if (btn)  btn.classList.remove('playing');
      if (icon) icon.textContent = '▶';
      if (prog) prog.style.width = '0%';
      currentId = null;
    }
    document.getElementById('nowPlaying').classList.remove('visible');
  }

  function switchCat(cat, btn) {
    stopAll();
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderMessages(cat);
  }

  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast'+(type?' '+type:'');
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Init voices ──
  if ('speechSynthesis' in window) {
    if (window.speechSynthesis.getVoices().length) {
      loadVoices();
    } else {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }
  }
</script>
</body>
